{{define "layout"}}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}OpenAI Proxy{{end}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">openai-proxy</a>
    <nav>
      <form method="post" action="/logout" class="inline">
        <button type="submit" class="link">logout</button>
      </form>
    </nav>
  </header>
  <main>
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
{{end}}
